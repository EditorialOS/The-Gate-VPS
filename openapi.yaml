openapi: 3.1.0
info:
  title: The Gate API
  version: "1.0.0"
  description: AI-powered editorial quality control. Per-key tenant isolation via Bearer token.
servers:
  - url: /api
paths:
  /gate:
    post:
      operationId: runGate
      summary: Evaluate a draft against a brief and return a verdict + scorecard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [brief, draft]
              properties:
                brief: { type: string, description: The editorial brief / requirements }
                draft: { type: string, description: The draft text to evaluate }
                voice_guide: { type: string, description: Optional brand voice guide }
                mode: { type: string, description: Evaluation mode, e.g. content }
      responses:
        "200": { description: Verdict and scorecard }
  /gate/reviews:
    get:
      operationId: listReviews
      summary: List reviews for the authenticated tenant (key-scoped)
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer }
        - name: offset
          in: query
          required: false
          schema: { type: integer }
        - name: verdict
          in: query
          required: false
          schema: { type: string }
      responses:
        "200": { description: List of reviews }
  /gate/reviews/{id}:
    get:
      operationId: getReview
      summary: Get a single review by id (key-scoped)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: A review }
        "404": { description: Not found }
